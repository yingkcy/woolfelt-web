<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>草圖配對遊戲</title>
<link rel="stylesheet" href="css/style.css">
<style>
body{font-family:Arial,sans-serif;background:#f2f4f8;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.container{background:white;padding:25px;width:420px;border-radius:12px;box-shadow:0 8px 20px rgba(0,0,0,0.1);text-align:center;}
img{width:100%;max-height:250px;object-fit:contain;margin:15px 0;}
input{width:100%;padding:8px;font-size:16px;margin:10px 0;}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;background:#4a90e2;color:white;margin:5px;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;}
#popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;display:none;}

</style>
</head>
<body>

<header class="nav">
  <div class="nav-logo">Entwined<br> <span>Vitality</span></div>
  <nav>
    <a href="gallery.html">Exhibition</a>
    <a href="about.html">About</a>
  </nav>
</header>

<div class="container" id="quizArea">
  <h2 id="question"></h2>
  <img id="sketchImage">
  <input type="text" id="answer" placeholder="輸入作品號碼，例如 1">
  <button onclick="checkAnswer()">確認</button>
  <button onclick="passQuestion()">跳過</button>
  <p id="currentScore">目前分數：0</p>
</div>

<div id="overlay"></div>

<div id="popup">
  <p id="popupText"></p>
  <button id="nextBtn" onclick="nextQuestion()">下一題</button>
</div>

<div class="container" id="resultArea" style="display:none;">
  <h2>完成 🎉</h2>
  <p id="finalScore"></p>
  <p id="finalMessage"></p>
  <button onclick="restartQuiz()">重新開始</button>
</div>

<script>
// ------------------ 遊戲變數 ------------------
let currentQuestion = 0;
let score = 0;
let quiz5 = [];

// 建立32題
const quiz = [];
for(let i=1;i<=32;i++){
  quiz.push({
    answer:String(i), // 答案就是照片數字
    image:"image/drafts/"+String(i).padStart(2,"0")+".jpg"
  });
}

// 洗牌函數
function shuffle(array){
  for(let i=array.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [array[i],array[j]]=[array[j],array[i]];
  }
  return array;
}

// ------------------ 遊戲流程 ------------------
function startQuiz(){
  score = 0;
  currentQuestion = 0;
  quiz5 = shuffle([...quiz]).slice(0,5); // 取 5 題
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("quizArea").style.display = "block";
  updateScoreDisplay();
  loadQuestion();
}

// 載入題目
function loadQuestion(){
  let q = quiz5[currentQuestion];
  document.getElementById("question").textContent =
    "第 " + (currentQuestion+1) + " / 5 題";
  document.getElementById("sketchImage").src = q.image;
  document.getElementById("answer").value="";
  
  // 每次載入題目，下一題按鈕先顯示
  document.getElementById("nextBtn").style.display = "inline-block";
}

// 更新累積分數顯示
function updateScoreDisplay(){
  document.getElementById("currentScore").textContent = "目前分數：" + score;
}

// 確認答案
function checkAnswer(){
  let userAnswer = document.getElementById("answer").value.trim();
  if(userAnswer === "") return;

  let correct = parseInt(userAnswer) === parseInt(quiz5[currentQuestion].answer);
  if(correct){
    score += 20;
    updateScoreDisplay();
  }

  // 如果是最後一題，直接跳結果頁面
  if(currentQuestion === quiz5.length - 1){
    showResult();
  } else {
    showPopup(correct ? "✔ 答對了！得20分" : "✘ 答錯了！");
  }
}


// 顯示答題彈窗
function showPopup(message){
  document.getElementById("popupText").textContent = message;
  document.getElementById("overlay").style.display = "block";
  document.getElementById("popup").style.display = "block";
}

// 下一題
function nextQuestion(){
  document.getElementById("overlay").style.display = "none";
  document.getElementById("popup").style.display = "none";

  currentQuestion++;
  if(currentQuestion < quiz5.length){
    loadQuestion();
  }
}

// 顯示結果頁面
function showResult(){
  document.getElementById("quizArea").style.display = "none";
  document.getElementById("popup").style.display = "none";
  document.getElementById("overlay").style.display = "none";
  document.getElementById("resultArea").style.display = "block";
  
  document.getElementById("finalScore").textContent = 
    "你的分數：" + score + " / 100";

  let msg = "";
  if(score === 100) msg = "🎉 你太厲害了！恭喜獲得大獎！請憑手機畫面換取禮物~";
  else if(score >= 80) msg = "👍很棒！恭喜獲得中獎！請憑手機畫面換取禮物~";
  else if(score >= 60) msg = "🙂 不錯！恭喜獲得小獎！請憑手機畫面換取禮物~";
  else msg = "😅60分以下沒有禮物，沒關係，多玩幾次就好！";
  document.getElementById("finalMessage").textContent = msg;
}

// 重新開始
function restartQuiz(){
  startQuiz();
}

// ------------------ 初始化 ------------------
startQuiz();
</script>
</body>
</html>
